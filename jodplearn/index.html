<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JodPlearn | NaphatHub</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4361ee">
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee; --primary-hover: #3a53d0; --success: #10b981; --danger: #ef4444;
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-light: #64748b; --elem-bg: #f1f5f9; --border: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-light: #94a3b8; --elem-bg: #334155; --border: #475569;
        }
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; margin: 0; padding: 0; touch-action: manipulation; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; transition: background-color 0.3s ease, color 0.3s ease; }
        
        .container { background: var(--card-bg); width: 100%; max-width: 420px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); padding: 20px 25px; display: flex; flex-direction: column; max-height: 95vh; height: 90vh; transition: background-color 0.3s ease; overflow: hidden; }

        .top-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;}
        .header-group { display: flex; gap: 6px; }
        .header-title { text-align: center; margin-bottom: 20px; width: 100%; }
        h1 { font-size: 24px; color: var(--primary); font-weight: 700; margin: 0; }

        .icon-btn { background: var(--elem-bg); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; color: var(--text-main); transition: transform 0.2s; display: flex; justify-content: center; align-items: center;}
        .icon-btn:active { transform: scale(0.9); }

        .back-link-hub { color: var(--primary); text-decoration: none; font-weight: 600; background: var(--elem-bg); padding: 8px 12px; border-radius: 12px; transition: transform 0.2s; font-size: 14px; display: flex; align-items: center; }
        .back-link-hub:active { transform: scale(0.95); }
        [data-theme="dark"] .back-link-hub { background: #334155; color: #f8fafc; }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .item-input { flex-grow: 1; padding: 15px; border: 2px solid var(--border); border-radius: 14px; font-size: 16px; background-color: var(--bg); color: var(--text-main); outline: none; transition: border-color 0.2s; }
        .item-input:focus { border-color: var(--primary); }
        .add-btn { background: var(--primary); color: white; border: none; border-radius: 14px; padding: 0 20px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .add-btn:active { transform: scale(0.95); }

        .list-container { flex-grow: 1; overflow-y: auto; overflow-x: hidden; padding-right: 5px; }
        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* เอาแอนิเมชันเด้งๆ (Bouncy Pop) กลับมาใส่! */
        .list-item { opacity: 0; display: flex; justify-content: space-between; align-items: center; background: var(--elem-bg); padding: 12px 15px; border-radius: 14px; margin-bottom: 10px; transition: background 0.3s; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .list-item.checked { opacity: 0.5; animation: none; transform: scale(0.98); }
        .list-item.checked .item-text { text-decoration: line-through; color: var(--text-light); }
        
        .item-left { display: flex; align-items: center; gap: 12px; flex-grow: 1; cursor: pointer; }
        .checkbox { width: 24px; height: 24px; border: 2px solid var(--primary); border-radius: 6px; display: flex; justify-content: center; align-items: center; color: transparent; transition: all 0.2s ease; }
        .list-item.checked .checkbox { background: var(--primary); color: white; border-color: var(--primary); }
        .item-text { font-size: 16px; font-weight: 500; word-break: break-word; transition: color 0.3s ease; }

        .delete-btn { background: transparent; border: none; color: var(--text-light); font-size: 16px; cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.2s; }
        .delete-btn:hover { color: var(--danger); background: #fee2e2; }
        [data-theme="dark"] .delete-btn:hover { background: #450a0a; }

        .bottom-actions { display: flex; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 2px dashed var(--border); }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .action-btn:active { transform: scale(0.95); }
        .btn-clear-checked { background: var(--elem-bg); color: var(--text-main); }
        .btn-clear-all { background: #fee2e2; color: var(--danger); }
        [data-theme="dark"] .btn-clear-all { background: #450a0a; }
        .empty-state { text-align: center; color: var(--text-light); margin-top: 40px; font-size: 15px; }
    </style>
    <script>if(localStorage.getItem('naphathub_theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }</script>
</head>
<body>


<div class="container">
    <div class="top-controls">
        <a href="../index.html" class="back-link-hub">🔙 กลับ Hub</a>
        <div class="header-group">
            <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="เปลี่ยนโหมดสี">☀️</button>
        </div>
    </div>
    
    <div class="header-title">
        <h1>📝 จดเพลิน</h1>
    </div>

    <div class="input-group">
        <input type="text" id="itemInput" class="item-input" placeholder="พิมพ์ของที่ต้องซื้อ..." onkeypress="handleEnter(event)">
        <button class="add-btn" onclick="addItem()">เพิ่ม</button>
    </div>

    <div class="list-container" id="listContainer"></div>

    <div class="bottom-actions">
        <button class="action-btn btn-clear-checked" onclick="clearChecked()">ล้างที่ซื้อแล้ว</button>
        <button class="action-btn btn-clear-all" onclick="clearAll()">ลบทั้งหมด</button>
    </div>
</div>

<script>
    let items = JSON.parse(localStorage.getItem('jodplearn_data')) || [];

    // ----- ระบบเสียงเอฟเฟกต์ -----
    const globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playGlobalClick() {
        if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
        const osc = globalAudioCtx.createOscillator(); const gain = globalAudioCtx.createGain();
        osc.connect(gain); gain.connect(globalAudioCtx.destination);
        osc.frequency.setValueAtTime(800, globalAudioCtx.currentTime); gain.gain.setValueAtTime(0.1, globalAudioCtx.currentTime);
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, globalAudioCtx.currentTime + 0.1); osc.stop(globalAudioCtx.currentTime + 0.1);
    }

    function playSound(type) {
        if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
        const osc = globalAudioCtx.createOscillator(); const gain = globalAudioCtx.createGain();
        osc.connect(gain); gain.connect(globalAudioCtx.destination);
        if (type === 'add') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, globalAudioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, globalAudioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, globalAudioCtx.currentTime); osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, globalAudioCtx.currentTime + 0.1); osc.stop(globalAudioCtx.currentTime + 0.1); } 
        else if (type === 'check') { osc.type = 'triangle'; osc.frequency.setValueAtTime(1200, globalAudioCtx.currentTime); gain.gain.setValueAtTime(0.1, globalAudioCtx.currentTime); osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, globalAudioCtx.currentTime + 0.1); osc.stop(globalAudioCtx.currentTime + 0.1); }
        else if (type === 'delete') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, globalAudioCtx.currentTime); gain.gain.setValueAtTime(0.1, globalAudioCtx.currentTime); osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, globalAudioCtx.currentTime + 0.1); osc.stop(globalAudioCtx.currentTime + 0.1); }
    }

    // ----- จัดการโหมดสี -----
    function updateThemeIcon() { document.getElementById('themeBtn').innerText = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙'; }
    updateThemeIcon();

    function toggleTheme() {
        const html = document.documentElement;
        if (html.getAttribute('data-theme') === 'dark') { html.removeAttribute('data-theme'); localStorage.setItem('naphathub_theme', 'light'); } 
        else { html.setAttribute('data-theme', 'dark'); localStorage.setItem('naphathub_theme', 'dark'); }
        updateThemeIcon();
    }

    // ----- ระบบจัดการเช็คลิสต์ -----
    function saveData() { localStorage.setItem('jodplearn_data', JSON.stringify(items)); renderList(); }
    function handleEnter(e) { if (e.key === 'Enter') addItem(); }

    function addItem() {
        const input = document.getElementById('itemInput'); const text = input.value.trim();
        if (text === '') return;
        playSound('add'); items.unshift({ id: Date.now(), text: text, checked: false }); 
        input.value = ''; input.focus(); saveData();
    }

    function toggleCheck(id) {
        const item = items.find(i => i.id === id);
        if (item) {
            item.checked = !item.checked;
            if(item.checked) playSound('check'); else playGlobalClick();
            
            // อัปเดตเฉพาะอันที่กด จะได้ไม่โหลดแอนิเมชันใหม่ทั้งแผง! (นี่คือการแก้บัคตาเหลือก)
            const itemElement = document.getElementById(`item-${id}`);
            if(item.checked) {
                itemElement.classList.add('checked');
                itemElement.querySelector('.checkbox').innerText = '✓';
            } else {
                itemElement.classList.remove('checked');
                itemElement.querySelector('.checkbox').innerText = '';
            }
            localStorage.setItem('jodplearn_data', JSON.stringify(items));
        }
    }

    function deleteItem(id) { playSound('delete'); items = items.filter(i => i.id !== id); saveData(); }
    function clearChecked() { if(items.filter(i => i.checked).length === 0) return; playSound('delete'); items = items.filter(i => !i.checked); saveData(); }
    function clearAll() { if(items.length === 0) return; playSound('delete'); if(confirm('ต้องการล้างรายการทั้งหมดใช่หรือไม่?')) { items = []; saveData(); } }

    function renderList() {
        const container = document.getElementById('listContainer');
        container.innerHTML = '';
        if (items.length === 0) { container.innerHTML = '<div class="empty-state">🛒 ยังไม่มีของที่ต้องซื้อ<br><span style="font-size:12px;">พิมพ์แล้วกด "เพิ่ม" ได้เลย!</span></div>'; return; }

        items.forEach((item, index) => {
            const checkedClass = item.checked ? 'checked' : '';
            const checkIcon = item.checked ? '✓' : '';
            // ดีเลย์แอนิเมชันให้เด้งลงมาทีละอัน!
            const delay = index * 0.05; 
            
            container.innerHTML += `
                <div class="list-item ${checkedClass}" id="item-${item.id}" style="animation-delay: ${delay}s">
                    <div class="item-left" onclick="toggleCheck(${item.id})">
                        <div class="checkbox">${checkIcon}</div>
                        <div class="item-text">${item.text}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
                </div>
            `;
        });
    }

    renderList();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>

</body>
</html>
