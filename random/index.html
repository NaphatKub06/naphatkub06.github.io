<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Picker | NaphatHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; margin: 0; padding: 0; }
        body { background-color: #8b5cf6; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; transition: background-color 0.5s; }
        
        .back-link { position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; font-weight: 600; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 20px; transition: 0.2s; }
        .back-link:hover { background: rgba(0,0,0,0.4); }

        .container { background: white; color: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); width: 100%; max-width: 500px; text-align: center; }
        h1 { font-size: 24px; color: #8b5cf6; margin-bottom: 20px; }

        .result-box { background: #f1f5f9; border: 2px dashed #cbd5e1; height: 120px; border-radius: 16px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .winner-text { font-size: 32px; font-weight: 700; color: #1e293b; }
        .winner-text.spinning { color: #94a3b8; filter: blur(1px); }
        .winner-text.highlight { color: #ef4444; transform: scale(1.2); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; resize: none; margin-bottom: 20px; outline: none; }
        textarea:focus { border-color: #8b5cf6; }

        button { width: 100%; background: linear-gradient(135deg, #8b5cf6, #d946ef); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">🔙 กลับ Hub</a>

    <div class="container">
        <h1>🎲 วงล้อสุ่มผู้โชคดี</h1>
        
        <div class="result-box">
            <div class="winner-text" id="resultText">รอการสุ่ม...</div>
        </div>

        <textarea id="nameList" placeholder="พิมพ์รายชื่อที่ต้องการสุ่ม (1 ชื่อต่อ 1 บรรทัด)"></textarea>
        
        <button id="spinBtn" onclick="spin()">🎉 เริ่มสุ่มเลย!</button>
    </div>

    <script>
        const nameListArea = document.getElementById('nameList');
        const resultText = document.getElementById('resultText');
        const spinBtn = document.getElementById('spinBtn');

        // โหลดชื่อที่เคยพิมพ์ไว้
        nameListArea.value = localStorage.getItem('naphathub_random_names') || "";

        function spin() {
            // เซฟรายชื่อไว้ก่อนสุ่ม
            localStorage.setItem('naphathub_random_names', nameListArea.value);

            const names = nameListArea.value.split('\n').filter(n => n.trim() !== '');
            if (names.length === 0) return alert('กรุณาใส่ชื่ออย่างน้อย 1 ชื่อครับ!');
            if (names.length === 1) return alert('ใส่ชื่อเดียวจะสุ่มทำไมล่ะค้าบบบ 😂');

            spinBtn.disabled = true;
            resultText.classList.remove('highlight');
            resultText.classList.add('spinning');
            document.body.style.backgroundColor = '#1e293b'; // ทำฉากหลังมืดตอนสุ่ม

            let spins = 0;
            const maxSpins = 30; // จำนวนรอบที่กระพริบ
            const spinInterval = setInterval(() => {
                const randomName = names[Math.floor(Math.random() * names.length)];
                resultText.innerText = randomName;
                spins++;

                if (spins >= maxSpins) {
                    clearInterval(spinInterval);
                    const winner = names[Math.floor(Math.random() * names.length)];
                    resultText.innerText = `👑 ${winner} 👑`;
                    
                    // เอฟเฟกต์ตอนได้ผู้ชนะ
                    resultText.classList.remove('spinning');
                    resultText.classList.add('highlight');
                    document.body.style.backgroundColor = '#10b981'; // ฉากหลังสีเขียวฉลอง
                    spinBtn.disabled = false;
                }
            }, 100); // ความเร็วในการสลับชื่อ
        }
    </script>
<script>
        const globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playGlobalClick() {
            if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
            const osc = globalAudioCtx.createOscillator();
            const gain = globalAudioCtx.createGain();
            osc.connect(gain); gain.connect(globalAudioCtx.destination);
            osc.frequency.setValueAtTime(800, globalAudioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, globalAudioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, globalAudioCtx.currentTime + 0.1);
            osc.stop(globalAudioCtx.currentTime + 0.1);
        }

        // จับคู่เสียงกับทุกปุ่มและทุกลิงก์กลับ Hub บนหน้าเว็บ
        document.querySelectorAll('button, a[href="../index.html"], .back-link-hub').forEach(btn => {
            btn.addEventListener('click', playGlobalClick);
        });
    </script>
</body>
</html>
