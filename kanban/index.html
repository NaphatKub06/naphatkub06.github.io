<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Kanban | NaphatHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f1f5f9; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .main-wrapper { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 20px; }

        .header { display: flex; align-items: center; background: white; padding: 15px 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .back-link { color: #3b82f6; text-decoration: none; font-weight: 600; background: #eff6ff; padding: 8px 15px; border-radius: 8px; margin-right: 15px; transition: 0.2s; }
        .back-link:hover { background: #dbeafe; }
        h1 { font-size: 22px; color: #1e293b; margin: 0; }

        .add-task-box { display: flex; gap: 10px; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { flex-grow: 1; padding: 12px 15px; border-radius: 8px; border: 2px solid #e2e8f0; outline: none; font-size: 15px; transition: 0.2s; }
        input:focus { border-color: #3b82f6; }
        button.add-btn { background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 15px; transition: 0.2s; }
        button.add-btn:active { transform: scale(0.95); }

        .board { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; }
        .column { background: #e2e8f0; border-radius: 16px; width: 320px; flex-shrink: 0; padding: 20px; display: flex; flex-direction: column; min-height: 450px; }
        .col-header { font-weight: 600; font-size: 16px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center; }
        .task-count { background: white; padding: 2px 10px; border-radius: 20px; font-size: 14px; color: #64748b; }
        
        .task-list { flex-grow: 1; min-height: 50px; }
        .task { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); margin-bottom: 12px; cursor: grab; font-size: 15px; display: flex; justify-content: space-between; align-items: flex-start; transition: transform 0.1s; border-left: 5px solid transparent; }
        .task:active { cursor: grabbing; transform: scale(0.98); }
        .task.dragging { opacity: 0.5; }
        .task:hover .delete-btn { opacity: 1; }

        .col-todo .task { border-left-color: #ef4444; }
        .col-doing .task { border-left-color: #f59e0b; }
        .col-done .task { border-left-color: #10b981; }

        .delete-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; opacity: 0; transition: 0.2s; font-size: 14px; }
        .delete-btn:hover { color: #ef4444; }

        /* Custom Scrollbar สำหรับ Board */
        .board::-webkit-scrollbar { height: 8px; }
        .board::-webkit-scrollbar-track { background: transparent; }
        .board::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="header">
            <a href="../index.html" class="back-link">🔙 Hub</a>
            <h1>🗂️ Mini Kanban</h1>
        </div>

        <div class="add-task-box">
            <input type="text" id="taskInput" placeholder="พิมพ์งานที่ต้องทำ..." onkeypress="handleEnter(event)">
            <button class="add-btn" onclick="addTask()">+ เพิ่มงาน</button>
        </div>

        <div class="board">
            <div class="column col-todo">
                <div class="col-header">📌 ต้องทำ <span class="task-count" id="count-todo">0</span></div>
                <div class="task-list" id="todo" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </div>
            <div class="column col-doing">
                <div class="col-header">⏳ กำลังทำ <span class="task-count" id="count-doing">0</span></div>
                <div class="task-list" id="doing" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </div>
            <div class="column col-done">
                <div class="col-header">✅ เสร็จแล้ว <span class="task-count" id="count-done">0</span></div>
                <div class="task-list" id="done" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </div>
        </div>
    </div>

    <script>
        const globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playGlobalClick() {
            if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
            const osc = globalAudioCtx.createOscillator(); const gain = globalAudioCtx.createGain();
            osc.connect(gain); gain.connect(globalAudioCtx.destination);
            osc.frequency.setValueAtTime(800, globalAudioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, globalAudioCtx.currentTime);
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, globalAudioCtx.currentTime + 0.1); osc.stop(globalAudioCtx.currentTime + 0.1);
        }
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.closest('a')) playGlobalClick();
        });
    </script>

    <script>
        let tasks = JSON.parse(localStorage.getItem('naphathub_kanban')) || { todo: [], doing: [], done: [] };
        function saveTasks() { localStorage.setItem('naphathub_kanban', JSON.stringify(tasks)); renderTasks(); }

        function renderTasks() {
            ['todo', 'doing', 'done'].forEach(col => {
                const list = document.getElementById(col);
                list.innerHTML = '';
                document.getElementById(`count-${col}`).innerText = tasks[col].length;
                
                tasks[col].forEach((task, index) => {
                    const taskEl = document.createElement('div');
                    taskEl.className = 'task'; taskEl.draggable = true;
                    taskEl.innerHTML = `<span>${task}</span> <button class="delete-btn" onclick="deleteTask('${col}', ${index})">❌</button>`;
                    
                    taskEl.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', JSON.stringify({ col, index }));
                        setTimeout(() => taskEl.classList.add('dragging'), 0);
                    });
                    taskEl.addEventListener('dragend', () => taskEl.classList.remove('dragging'));
                    list.appendChild(taskEl);
                });
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if(input.value.trim() === '') return;
            tasks.todo.push(input.value.trim());
            input.value = ''; saveTasks();
        }
        function handleEnter(e) { if(e.key === 'Enter') addTask(); }
        function deleteTask(col, index) { tasks[col].splice(index, 1); saveTasks(); }
        function allowDrop(e) { e.preventDefault(); }
        
        function drop(e) {
            e.preventDefault();
            const dataStr = e.dataTransfer.getData('text/plain');
            if(!dataStr) return;
            const data = JSON.parse(dataStr);
            const targetCol = e.target.closest('.task-list').id;
            
            if(data.col !== targetCol && targetCol) {
                const taskText = tasks[data.col].splice(data.index, 1)[0];
                tasks[targetCol].push(taskText);
                saveTasks();
            }
        }
        renderTasks();
    </script>
</body>
</html>
