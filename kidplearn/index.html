<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คิดเพลิน - ระบบคิดเงินและเงินทอน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-light: #64748b;
            --elem-bg: #f1f5f9;
            --border: #e2e8f0;
        }

        /* Dark Mode */
        body.dark-mode {
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
            --text-light: #94a3b8; --elem-bg: #334155; --border: #475569;
        }

        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; margin: 0; padding: 0; touch-action: manipulation; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; transition: background-color 0.3s; }
        
        .container { background: var(--card-bg); width: 100%; max-width: 420px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); padding: 20px 25px; display: flex; flex-direction: column; max-height: 95vh; transition: background-color 0.3s; }

        /* Header Area */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header-group { display: flex; gap: 8px; }
        .icon-btn { background: var(--elem-bg); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; color: var(--text-main); transition: transform 0.1s; display: flex; justify-content: center; align-items: center;}
        .icon-btn:active { transform: scale(0.9); }
        h1 { font-size: 22px; color: var(--primary); font-weight: 700; margin: 0; }

        .section { display: none; animation: fadeIn 0.3s ease forwards; flex-grow: 1; flex-direction: column; }
        .section.active { display: flex !important; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Lists */
        .item-list { flex-grow: 1; min-height: 100px; max-height: 160px; overflow-y: auto; border-radius: 12px; background: var(--elem-bg); padding: 10px; margin-bottom: 10px; }
        .item { display: flex; justify-content: space-between; padding: 6px 12px; border-bottom: 1px solid var(--border); font-size: 15px; color: var(--text-main); }
        .item:last-child { border-bottom: none; }
        .item.discount { color: var(--danger); }

        /* Quick Action Bar */
        .quick-actions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 10px; scrollbar-width: none; }
        .quick-actions::-webkit-scrollbar { display: none; }
        .quick-btn { white-space: nowrap; padding: 8px 15px; border-radius: 20px; border: none; background: var(--elem-bg); color: var(--text-main); font-weight: 600; font-size: 14px; cursor: pointer; }
        .quick-btn:active { transform: scale(0.95); }
        .discount-btn { background: #fee2e2; color: var(--danger); border: 1px solid var(--danger); }
        body.dark-mode .discount-btn { background: #450a0a; }

        /* Numpad & Input Display */
        .input-display { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 12px 15px; font-size: 24px; font-weight: 600; text-align: right; margin-bottom: 10px; color: var(--text-main); min-height: 55px; display: flex; align-items: center; justify-content: flex-end; }
        .input-display.empty { color: var(--text-light); font-weight: 400; }
        .numpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-num { background-color: var(--elem-bg); border: none; border-radius: 12px; font-size: 20px; font-weight: 600; color: var(--text-main); padding: 12px 0; cursor: pointer; }
        .btn-num:active { transform: scale(0.95); }
        .btn-action { background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-action:active { transform: scale(0.95); }

        /* Native Inputs (For Manual Mode) */
        .native-input { width: 100%; padding: 15px; border: 2px solid var(--border); border-radius: 12px; font-size: 24px; font-weight: 600; outline: none; text-align: right; margin-bottom: 15px; background-color: var(--bg); color: var(--text-main); }
        .native-input:focus { border-color: var(--primary); }

        /* General Buttons */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; color: white; background-color: var(--primary); transition: transform 0.1s;}
        .btn:active { transform: scale(0.98); }
        .btn.success { background-color: var(--success); }
        .btn.outline { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn.danger { background-color: var(--danger); }

        /* Money Buttons */
        .money-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .money-btn { border: none; border-radius: 10px; padding: 12px 5px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; }
        .money-btn:active { transform: scale(0.92); }
        .m-1, .m-2, .m-5, .m-10 { background-color: #64748b; } .m-20 { background-color: #22c55e; } .m-50 { background-color: #3b82f6; } .m-100 { background-color: #ef4444; } .m-500 { background-color: #a855f7; } .m-1000 { background-color: #8b5cf6; filter: grayscale(40%); }

        .status-box { background: var(--elem-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .status-row { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 5px; color: var(--text-main);}
        .status-row.total { font-size: 20px; font-weight: 700; color: var(--primary); border-bottom: 2px dashed var(--border); padding-bottom: 10px; margin-bottom: 10px;}
        
        .change-huge { font-size: 42px; color: var(--success); font-weight: 700; text-align: center; margin: 5px 0;}
        .breakdown-list { margin-top: 15px; background: var(--card-bg); border-radius: 10px; padding: 10px; border: 1px solid var(--border); }
        .breakdown-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); color: var(--text-main);}
        
        /* Modal History */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; }
        .modal.active { display: flex; animation: fadeIn 0.2s; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 350px; padding: 25px; border-radius: 20px; text-align: center; color: var(--text-main); }
        .modal-data { font-size: 32px; font-weight: 700; color: var(--success); margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-group">
            <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="เปลี่ยนโหมดสี">🌙</button>
            <button class="icon-btn" onclick="toggleInputMode()" id="modeBtn" title="สลับโหมดแป้นพิมพ์">⌨️</button>
        </div>
        <h1>💸 คิดเพลิน</h1>
        <button class="icon-btn" onclick="openHistory()" title="ยอดขายวันนี้">📊</button>
    </div>

    <div id="step-calculate" class="section active">
        
        <div class="item-list" id="itemList">
            <div class="item" style="color: var(--text-light); justify-content: center;">ยังไม่มีรายการสินค้า</div>
        </div>

        <div class="quick-actions">
            <button class="quick-btn discount-btn" onclick="addDiscount()">🏷️ หักส่วนลด</button>
            <button class="quick-btn" onclick="addQuickItem(5, 'ด่วน +5')">+ 5฿</button>
            <button class="quick-btn" onclick="addQuickItem(10, 'ด่วน +10')">+ 10฿</button>
            <button class="quick-btn" onclick="addQuickItem(20, 'ด่วน +20')">+ 20฿</button>
            <button class="quick-btn" onclick="addQuickItem(50, 'ด่วน +50')">+ 50฿</button>
        </div>

        <div id="numpadModeUI">
            <div class="input-display empty" id="priceDisplay">ใส่ราคา...</div>
            <div class="numpad">
                <button class="btn-num" onclick="typeNum('7')">7</button>
                <button class="btn-num" onclick="typeNum('8')">8</button>
                <button class="btn-num" onclick="typeNum('9')">9</button>
                <button class="btn-num" style="background-color: #fee2e2; color: var(--danger);" onclick="deleteNum()">⌫</button>
                
                <button class="btn-num" onclick="typeNum('4')">4</button>
                <button class="btn-num" onclick="typeNum('5')">5</button>
                <button class="btn-num" onclick="typeNum('6')">6</button>
                <button class="btn-action" style="background-color: var(--danger);" onclick="clearItems()">ล้างบิล</button>
                
                <button class="btn-num" onclick="typeNum('1')">1</button>
                <button class="btn-num" onclick="typeNum('2')">2</button>
                <button class="btn-num" onclick="typeNum('3')">3</button>
                <button class="btn-action" style="grid-column: 4; grid-row: 3 / span 2; background-color: var(--success);" onclick="addNormalPrice()">เพิ่ม<br>รายการ</button>
                
                <button class="btn-num" onclick="typeNum('00')">00</button>
                <button class="btn-num" onclick="typeNum('0')">0</button>
                <button class="btn-num" onclick="typeNum('.')">•</button>
            </div>
        </div>

        <div id="manualModeUI" style="display: none;">
            <input type="number" id="manualPriceInput" class="native-input" placeholder="พิมพ์ราคาสินค้า..." onkeypress="handleManualEnter(event)">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="btn success" onclick="addNormalPrice()">เพิ่มรายการ</button>
                <button class="btn danger" onclick="clearItems()" style="width: 30%;">ล้างบิล</button>
            </div>
        </div>

        <button onclick="goToPayment()" class="btn">รวมเงินทั้งหมด ➔</button>
    </div>

    <div id="step-payment" class="section">
        <div class="status-box">
            <div class="status-row total">
                <span>ยอดที่ต้องจ่าย:</span>
                <span id="payTotal">0 ฿</span>
            </div>
            <div class="status-row" style="color: var(--success); font-weight: 600;">
                <span>รับเงินมาแล้ว:</span>
                <span id="payReceived">0 ฿</span>
            </div>
        </div>

        <div id="tapMoneyUI">
            <p style="text-align: center; font-size: 14px; color: var(--text-light); margin-bottom: 10px;">แตะที่เงินเพื่อบวกยอดรับ</p>
            <div class="money-grid">
                <button class="money-btn m-1000" onclick="addMoney(1000)">+ 1000</button>
                <button class="money-btn m-500" onclick="addMoney(500)">+ 500</button>
                <button class="money-btn m-100" onclick="addMoney(100)">+ 100</button>
                <button class="money-btn m-50" onclick="addMoney(50)">+ 50</button>
                <button class="money-btn m-20" onclick="addMoney(20)">+ 20</button>
                <button class="money-btn m-10" onclick="addMoney(10)">+ 10</button>
                <button class="money-btn m-5" onclick="addMoney(5)">+ 5</button>
                <button class="money-btn m-2" onclick="addMoney(2)">+ 2</button>
                <button class="money-btn m-1" onclick="addMoney(1)">+ 1</button>
            </div>
        </div>

        <div id="manualMoneyUI" style="display: none;">
            <p style="text-align: center; font-size: 14px; color: var(--text-light); margin-bottom: 10px;">พิมพ์ยอดเงินที่รับมา</p>
            <input type="number" id="manualReceiveInput" class="native-input" placeholder="ยอดรับเงิน..." oninput="syncManualReceive()">
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button onclick="setExactMoney()" class="btn outline" style="flex: 1;">รับพอดีเป๊ะ</button>
            <button onclick="clearMoney()" class="btn danger" style="flex: 1;">ล้างยอดรับ</button>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button onclick="showSection('step-calculate')" class="btn" style="background-color: var(--text-light); width: 60px;">🔙</button>
            <button onclick="calculateChange()" class="btn success" style="flex: 1;">คิดเงินทอน</button>
        </div>
    </div>

    <div id="step-result" class="section">
        <div class="status-box" style="text-align: center;">
            <p style="color: var(--text-light); font-size: 16px;">ต้องทอนเงินลูกค้า</p>
            <div class="change-huge" id="changeAmount">0</div>
            <p style="color: var(--text-light);">บาท</p>
            <div id="changeBreakdown" class="breakdown-list"></div>
        </div>
        <button onclick="resetAll()" class="btn">✨ ปิดบิล (เริ่มใหม่)</button>
    </div>

</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--primary); margin-bottom: 10px;">📊 ยอดขายวันนี้</h2>
        <div style="font-size: 16px; color: var(--text-light);">รวมทั้งหมด</div>
        <div class="modal-data" id="historyTotal">0 ฿</div>
        <div style="font-size: 16px; margin-bottom: 20px;">จำนวน: <strong id="historyBills">0</strong> บิล</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn outline" onclick="closeHistory()">ปิด</button>
            <button class="btn danger" onclick="clearHistory()">ล้างยอด</button>
        </div>
    </div>
</div>

<script>
    let items = [];
    let totalAmount = 0;
    let currentInput = "";
    let receivedAmount = 0;
    let billSaved = false;
    let isManualMode = false;

    // ----- ระบบเสียง -----
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playSound(type = 'click') {
        initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'click') { osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1); osc.stop(audioCtx.currentTime + 0.1); } 
        else if (type === 'success') { osc.type = 'triangle'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2); osc.stop(audioCtx.currentTime + 0.2); } 
        else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3); osc.stop(audioCtx.currentTime + 0.3); }
    }

    // ----- ระบบโหมดมืด (Dark Mode) -----
    function toggleTheme() {
        playSound('click'); const body = document.body; const btn = document.getElementById('themeBtn');
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) { btn.innerText = '☀️'; localStorage.setItem('kidplearn_theme', 'dark'); } 
        else { btn.innerText = '🌙'; localStorage.setItem('kidplearn_theme', 'light'); }
    }
    if(localStorage.getItem('kidplearn_theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeBtn').innerText = '☀️'; }

    // ----- ระบบสลับโหมดคีย์บอร์ด (Manual Mode) -----
    function toggleInputMode() {
        playSound('click');
        isManualMode = !isManualMode;
        document.getElementById('modeBtn').innerText = isManualMode ? '🖩' : '⌨️';
        
        document.getElementById('numpadModeUI').style.display = isManualMode ? 'none' : 'block';
        document.getElementById('manualModeUI').style.display = isManualMode ? 'block' : 'none';
        
        document.getElementById('tapMoneyUI').style.display = isManualMode ? 'none' : 'block';
        document.getElementById('manualMoneyUI').style.display = isManualMode ? 'block' : 'none';

        localStorage.setItem('kidplearn_input_mode', isManualMode ? 'manual' : 'numpad');
        
        if (isManualMode && document.getElementById('step-calculate').classList.contains('active')) {
            document.getElementById('manualPriceInput').focus();
        }
    }
    if(localStorage.getItem('kidplearn_input_mode') === 'manual') { toggleInputMode(); }

    // ----- จัดการหน้า UI -----
    function showSection(id) {
        playSound('click');
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'step-calculate' && isManualMode) document.getElementById('manualPriceInput').focus();
        if (id === 'step-payment' && isManualMode) document.getElementById('manualReceiveInput').focus();
    }

    // ----- ระบบคิดเงิน -----
    function updateDisplay() {
        const pd = document.getElementById('priceDisplay');
        if (currentInput === "") { pd.innerText = "ใส่ราคา..."; pd.classList.add('empty'); } 
        else { pd.innerText = currentInput; pd.classList.remove('empty'); }
    }

    function typeNum(num) {
        playSound('click'); if (num === '.' && currentInput.includes('.')) return;
        if (currentInput === "0" && num !== ".") currentInput = ""; currentInput += num; updateDisplay();
    }
    function deleteNum() { playSound('click'); currentInput = currentInput.slice(0, -1); updateDisplay(); }
    function pushItem(price, name) { items.push({ name: name, price: price }); updateItemList(); }

    function addNormalPrice() {
        let val = isManualMode ? document.getElementById('manualPriceInput').value : currentInput;
        const price = parseFloat(val);
        if (isNaN(price) || price <= 0) { playSound('error'); return; }
        playSound('success');
        pushItem(price, `รายการที่ ${items.filter(i => i.price > 0).length + 1}`);
        if(isManualMode) { let mi = document.getElementById('manualPriceInput'); mi.value = ""; mi.focus(); } 
        else { currentInput = ""; updateDisplay(); }
    }

    function handleManualEnter(e) { if (e.key === 'Enter') addNormalPrice(); }
    function addQuickItem(price, name) { playSound('success'); pushItem(price, name); }

    function addDiscount() {
        let val = isManualMode ? document.getElementById('manualPriceInput').value : currentInput;
        const discount = parseFloat(val);
        if (isNaN(discount) || discount <= 0) { playSound('error'); alert('ใส่เลขที่ต้องการลดก่อนกดปุ่มหักส่วนลดครับ'); return; }
        if (discount > totalAmount && totalAmount > 0) { playSound('error'); alert('ส่วนลดมากกว่ายอดรวมครับ!'); return; }
        playSound('success'); pushItem(-discount, '🏷️ ส่วนลด');
        if(isManualMode) document.getElementById('manualPriceInput').value = "";
        else { currentInput = ""; updateDisplay(); }
    }

    function updateItemList() {
        const list = document.getElementById('itemList'); list.innerHTML = ''; totalAmount = 0;
        if(items.length === 0) { list.innerHTML = '<div class="item" style="color: var(--text-light); justify-content: center;">ยังไม่มีรายการสินค้า</div>'; return; }
        items.forEach((item) => {
            totalAmount += item.price;
            let displayPrice = item.price > 0 ? `${item.price.toLocaleString()} ฿` : `- ${Math.abs(item.price).toLocaleString()} ฿`;
            let itemClass = item.price < 0 ? 'item discount' : 'item';
            list.innerHTML += `<div class="${itemClass}"><span>${item.name}</span> <strong>${displayPrice}</strong></div>`;
        });
        list.scrollTop = list.scrollHeight;
    }

    function clearItems() {
        if(items.length === 0) return;
        playSound('error');
        if(confirm('ต้องการล้างบิลทั้งหมดใช่หรือไม่?')){
            items = []; currentInput = ""; document.getElementById('manualPriceInput').value = "";
            updateDisplay(); updateItemList();
        }
    }

    // ----- ระบบรับเงิน -----
    function goToPayment() {
        if (totalAmount <= 0) { playSound('error'); alert('บิลยังเป็น 0 บาทครับ!'); return; }
        playSound('success');
        document.getElementById('payTotal').innerText = totalAmount.toLocaleString() + ' ฿';
        receivedAmount = 0; document.getElementById('manualReceiveInput').value = ""; updateReceivedDisplay();
        showSection('step-payment');
    }

    function syncManualReceive() {
        receivedAmount = parseFloat(document.getElementById('manualReceiveInput').value) || 0;
        document.getElementById('payReceived').innerText = receivedAmount.toLocaleString() + ' ฿';
    }

    function addMoney(amount) { playSound('click'); receivedAmount += amount; updateReceivedDisplay(); }
    function setExactMoney() { 
        playSound('success'); receivedAmount = totalAmount; 
        if(isManualMode) document.getElementById('manualReceiveInput').value = totalAmount;
        updateReceivedDisplay(); 
    }
    function clearMoney() { 
        playSound('error'); receivedAmount = 0; 
        if(isManualMode) document.getElementById('manualReceiveInput').value = "";
        updateReceivedDisplay(); 
    }
    function updateReceivedDisplay() { document.getElementById('payReceived').innerText = receivedAmount.toLocaleString() + ' ฿'; }

    // ----- ระบบคิดเงินทอน & บันทึกยอด -----
    function calculateChange() {
        if (receivedAmount < totalAmount) { playSound('error'); alert('รับเงินมาไม่พอครับ! (ขาดอีก ' + (totalAmount - receivedAmount).toLocaleString() + ' บาท)'); return; }
        playSound('success');
        let change = receivedAmount - totalAmount;
        document.getElementById('changeAmount').innerText = change.toLocaleString();
        generateChangeBreakdown(change);
        if (!billSaved) { saveToHistory(totalAmount); billSaved = true; }
        showSection('step-result');
    }

    function generateChangeBreakdown(changeAmount) {
        const breakdownDiv = document.getElementById('changeBreakdown');
        breakdownDiv.innerHTML = '<div style="font-size:14px; color:var(--text-light); margin-bottom:5px; text-align:left;">หยิบเงินทอนดังนี้:</div>';
        if (changeAmount === 0) { breakdownDiv.innerHTML += '<div style="color:var(--success); font-weight:600;">จ่ายพอดี ไม่ต้องทอน 🎉</div>'; return; }
        const moneyTypes = [ { value: 1000, label: 'แบงค์ 1000', color: '#8b5cf6' }, { value: 500, label: 'แบงค์ 500', color: '#a855f7' }, { value: 100, label: 'แบงค์ 100', color: '#ef4444' }, { value: 50, label: 'แบงค์ 50', color: '#3b82f6' }, { value: 20, label: 'แบงค์ 20', color: '#22c55e' }, { value: 10, label: 'เหรียญ 10', color: '#64748b' }, { value: 5, label: 'เหรียญ 5', color: '#64748b' }, { value: 2, label: 'เหรียญ 2', color: '#64748b' }, { value: 1, label: 'เหรียญ 1', color: '#64748b' } ];
        let remaining = changeAmount;
        moneyTypes.forEach(money => {
            if (remaining >= money.value) {
                let count = Math.floor(remaining / money.value); remaining = remaining % money.value;
                breakdownDiv.innerHTML += `<div class="breakdown-item"><span style="color: ${money.color}; font-weight:600;">${money.label}</span><span>x <strong>${count}</strong></span></div>`;
            }
        });
    }

    function resetAll() {
        playSound('success'); items = []; totalAmount = 0; currentInput = ""; receivedAmount = 0; billSaved = false;
        document.getElementById('manualPriceInput').value = ""; document.getElementById('manualReceiveInput').value = "";
        updateDisplay(); updateItemList(); showSection('step-calculate');
    }

    // ----- ระบบสรุปยอดขาย -----
    function saveToHistory(amount) { let history = JSON.parse(localStorage.getItem('kidplearn_history')) || { bills: 0, total: 0 }; history.bills += 1; history.total += amount; localStorage.setItem('kidplearn_history', JSON.stringify(history)); }
    function openHistory() { playSound('click'); let history = JSON.parse(localStorage.getItem('kidplearn_history')) || { bills: 0, total: 0 }; document.getElementById('historyTotal').innerText = history.total.toLocaleString() + ' ฿'; document.getElementById('historyBills').innerText = history.bills.toLocaleString(); document.getElementById('historyModal').classList.add('active'); }
    function closeHistory() { playSound('click'); document.getElementById('historyModal').classList.remove('active'); }
    function clearHistory() { playSound('error'); if(confirm('ยืนยันการล้างยอดขายของวันนี้ทั้งหมด? (ไม่สามารถกู้คืนได้)')) { localStorage.setItem('kidplearn_history', JSON.stringify({ bills: 0, total: 0 })); openHistory(); } }
</script>
