<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KidPlearn | NaphatHub</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4361ee">
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #4361ee; --primary-hover: #3a53d0; --success: #10b981; --success-hover: #059669; --danger: #ef4444; --warning: #f59e0b;
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-light: #64748b; --elem-bg: #f1f5f9; --border: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-light: #94a3b8; --elem-bg: #334155; --border: #475569;
        }
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; margin: 0; padding: 0; touch-action: manipulation; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; transition: background-color 0.3s ease, color 0.3s ease; }
        
        .container { background: var(--card-bg); width: 100%; max-width: 420px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); padding: 20px 25px; display: flex; flex-direction: column; max-height: 95vh; transition: all 0.3s ease; overflow-y: auto; overflow-x: hidden; }
        .container::-webkit-scrollbar { width: 0px; }

        .top-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;}
        .header-group { display: flex; gap: 6px; }
        .header-title { text-align: center; margin-bottom: 15px; width: 100%; }
        h1 { font-size: 24px; color: var(--primary); font-weight: 700; margin: 0; transition: all 0.3s ease;}
        .icon-btn { background: var(--elem-bg); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; color: var(--text-main); transition: transform 0.2s; display: flex; justify-content: center; align-items: center;}
        .icon-btn:active { transform: scale(0.9); }
        .back-link-hub { color: var(--primary); text-decoration: none; font-weight: 600; background: var(--elem-bg); padding: 8px 12px; border-radius: 12px; transition: transform 0.2s; font-size: 14px; display: flex; align-items: center; }
        .back-link-hub:active { transform: scale(0.95); }
        [data-theme="dark"] .back-link-hub { background: #334155; color: #f8fafc; }

        .section { display: none; animation: fadeIn 0.3s ease forwards; flex-grow: 1; flex-direction: column; }
        .section.active { display: flex !important; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* จัดกลุ่ม Layout ใหม่ */
        .flex-layout { display: flex; flex-direction: column; flex-grow: 1; gap: 15px; }
        .flex-left, .flex-right { display: flex; flex-direction: column; }
        .flex-left { flex-grow: 1; }

        .item-list { flex-grow: 1; min-height: 100px; max-height: 160px; overflow-y: auto; border-radius: 12px; background: var(--elem-bg); padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column;}
        .item { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; border-bottom: 1px solid var(--border); font-size: 15px; color: var(--text-main); }
        .item:last-child { border-bottom: none; }
        .item.discount { color: var(--danger); }
        .item-delete-btn { background: transparent; border: none; color: var(--text-light); font-size: 14px; cursor: pointer; transition: 0.2s; margin-left: 8px; padding: 2px 5px; border-radius: 6px;}
        .item-delete-btn:hover { background: #fee2e2; color: var(--danger); }
        [data-theme="dark"] .item-delete-btn:hover { background: #450a0a; }

        .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .quick-btn { white-space: nowrap; padding: 8px 15px; border-radius: 20px; border: none; background: var(--elem-bg); color: var(--text-main); font-weight: 600; font-size: 14px; cursor: pointer; flex-grow: 1; text-align: center; }
        .quick-btn:active { transform: scale(0.95); }

        .input-display { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 12px 15px; font-size: 24px; font-weight: 600; text-align: right; margin-bottom: 10px; color: var(--text-main); min-height: 55px; display: flex; align-items: center; justify-content: flex-end; transition: all 0.3s ease;}
        .input-display.empty { color: var(--text-light); font-weight: 400; }
        .numpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-num { background-color: var(--elem-bg); border: none; border-radius: 12px; font-size: 20px; font-weight: 600; color: var(--text-main); padding: 12px 0; cursor: pointer; transition: all 0.3s ease;}
        .btn-num:active { transform: scale(0.95); }
        .btn-action { background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;}
        .btn-action:active { transform: scale(0.95); }

        .native-input { width: 100%; padding: 15px; border: 2px solid var(--border); border-radius: 12px; font-size: 24px; font-weight: 600; outline: none; text-align: right; margin-bottom: 15px; background-color: var(--bg); color: var(--text-main); transition: all 0.3s ease;}
        .native-input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; color: white; background-color: var(--primary); transition: transform 0.2s, padding 0.3s ease, font-size 0.3s ease; margin-bottom: 5px; }
        .btn:active { transform: scale(0.98); }
        .btn.success { background-color: var(--success); }
        .btn.outline { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn.danger { background-color: var(--danger); }

        .live-total-box { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; background: #e0e7ff; color: var(--primary); border-radius: 12px; margin-bottom: 10px; font-weight: 600; font-size: 18px; transition: all 0.3s ease;}
        [data-theme="dark"] .live-total-box { background: rgba(67, 97, 238, 0.15); color: #818cf8; }

        .money-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .money-btn { border: none; border-radius: 10px; padding: 12px 5px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s ease;}
        .money-btn:active { transform: scale(0.92); }
        .m-1, .m-2, .m-5, .m-10 { background-color: #64748b; } .m-20 { background-color: #22c55e; } .m-50 { background-color: #3b82f6; } .m-100 { background-color: #ef4444; } .m-500 { background-color: #a855f7; } .m-1000 { background-color: #8b5cf6; filter: grayscale(40%); }

        .status-box { background: var(--elem-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; transition: all 0.3s ease;}
        .status-row { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 5px; color: var(--text-main); transition: all 0.3s ease;}
        .status-row.total { font-size: 20px; font-weight: 700; color: var(--primary); border-bottom: 2px dashed var(--border); padding-bottom: 10px; margin-bottom: 10px;}
        
        .change-huge { font-size: 42px; color: var(--success); font-weight: 700; text-align: center; margin: 5px 0;}
        .breakdown-list { margin-top: 15px; background: var(--card-bg); border-radius: 10px; padding: 10px; border: 1px solid var(--border); }
        .breakdown-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); color: var(--text-main);}
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; }
        .modal.active { display: flex; animation: fadeIn 0.2s; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; text-align: center; color: var(--text-main); }
        .modal-data { font-size: 32px; font-weight: 700; color: var(--success); margin: 5px 0; }

        /* =========================================
           Responsive Layouts (ปรับขนาดตามเครื่อง)
           ========================================= */
        
        /* 1. แท็บเล็ตแนวตั้ง (ขยายขนาดให้กดง่าย ไม่ต้องซูม) */
        @media (min-width: 600px) and (orientation: portrait) {
            .container { max-width: 550px; padding: 30px; }
            h1 { font-size: 28px; }
            .item-list { max-height: 250px; }
            .item { font-size: 18px; padding: 10px 15px; }
            .input-display { font-size: 32px; min-height: 70px; }
            .btn-num { font-size: 26px; padding: 18px 0; }
            .btn { font-size: 20px; padding: 20px; }
            .btn-action { font-size: 20px; }
            .live-total-box { font-size: 22px; padding: 18px 20px; }
            .status-row { font-size: 20px; }
            .status-row.total { font-size: 26px; }
            .money-btn { font-size: 20px; padding: 18px 5px; }
        }

        /* 2. คอมพิวเตอร์ หรือ แท็บเล็ตแนวนอน (แบ่ง Layout ซ้าย-ขวา) */
        @media (min-width: 768px) and (orientation: landscape) {
            .container { 
                max-width: 850px; 
                padding: 30px 40px; 
                max-height: 90vh;
            }
            
            /* เปลี่ยนให้เรียงเป็นแถวซ้าย-ขวา */
            .flex-layout { 
                flex-direction: row; 
                align-items: stretch;
                gap: 30px;
            }
            .flex-left { width: 45%; justify-content: space-between; }
            .flex-right { width: 55%; justify-content: center; }
            
            /* ปรับขนาดอักษรและปุ่มให้เหมาะกับจอใหญ่ */
            h1 { font-size: 30px; }
            .item-list { max-height: none; height: 100%; min-height: 250px; margin-bottom: 0; }
            .item { font-size: 16px; padding: 10px 15px; }
            .input-display { font-size: 32px; min-height: 70px; }
            .btn-num { font-size: 24px; padding: 16px 0; }
            .btn { font-size: 18px; padding: 16px; }
            .btn-action { font-size: 18px; }
            .live-total-box { font-size: 22px; margin-top: 15px; }
            
            /* ส่วนคิดเงินทอน */
            #step-payment .flex-left { justify-content: flex-start; gap: 15px;}
            #step-payment .flex-left > div:last-child { margin-top: auto; }
            .status-row { font-size: 18px; }
            .status-row.total { font-size: 24px; }
            .money-btn { font-size: 18px; padding: 15px 5px; }
        }
    </style>
    
    <script>
        // เปลี่ยนมาใช้ naphathub_theme เพื่อเชื่อมกับหน้าหลัก
        if(localStorage.getItem('naphathub_theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
        
        // อพยพข้อมูลยอดขายแบบเก่ามาระบบใหม่ (กราฟ 7 วัน)
        let oldHist = JSON.parse(localStorage.getItem('kidplearn_history'));
        if(oldHist) {
            let newHist = JSON.parse(localStorage.getItem('kidplearn_history_v2')) || {}; 
            let d = new Date(); let todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            if (!newHist[todayStr]) newHist[todayStr] = { bills: 0, total: 0 };
            newHist[todayStr].bills += oldHist.bills || 0; newHist[todayStr].total += oldHist.total || 0; 
            localStorage.setItem('kidplearn_history_v2', JSON.stringify(newHist)); 
            localStorage.removeItem('kidplearn_history');
        }
    </script>
</head>
<body>

<div class="container">
    <div class="top-controls">
        <a href= class="back-link-hub"></a>
        <div class="header-group">
            <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="เปลี่ยนโหมดสี">🌙</button>
            <button class="icon-btn" onclick="toggleInputMode()" id="modeBtn" title="สลับโหมดแป้นพิมพ์">⌨️</button>
            <button class="icon-btn" onclick="toggleTTS()" id="ttsBtn" title="เปิด/ปิดเสียงพูดระบบ">🗣️</button>
            <button class="icon-btn" onclick="openHistory()" title="ยอดขายย้อนหลัง">📊</button>
        </div>
    </div>
    
    <div class="header-title">
        <h1>💸 คิดเพลิน</h1>
    </div>

    <!-- ส่วนที่ 1: หน้าคิดเงิน -->
    <div id="step-calculate" class="section active">
        <div class="flex-layout">
            <!-- ซ้าย (แนวนอน) / บน (แนวตั้ง) -->
            <div class="flex-left">
                <div class="item-list" id="itemList">
                    <div class="item" style="color: var(--text-light); justify-content: center; height: 100%; align-items: center;">ยังไม่มีรายการสินค้า</div>
                </div>
                <div>
                    <div class="live-total-box">
                        <span>🛒 ยอดรวม:</span>
                        <span id="liveTotalDisplay">0 ฿</span>
                    </div>
                    <button onclick="goToPayment()" class="btn">รวมเงินทั้งหมด ➔</button>
                </div>
            </div>

            <!-- ขวา (แนวนอน) / ล่าง (แนวตั้ง) -->
            <div class="flex-right">
                <div class="quick-actions">
                    <button class="quick-btn" onclick="addQuickItem(5, 'รายการที่')">+ 5฿</button>
                    <button class="quick-btn" onclick="addQuickItem(10, 'รายการที่')">+ 10฿</button>
                    <button class="quick-btn" onclick="addQuickItem(15, 'รายการที่')">+ 15฿</button>
                    <button class="quick-btn" onclick="addQuickItem(20, 'รายการที่')">+ 20฿</button>
                    <button class="quick-btn" onclick="addQuickItem(25, 'รายการที่')">+ 25฿</button>
                    <button class="quick-btn" onclick="addQuickItem(30, 'รายการที่')">+ 30฿</button>
                    <button class="quick-btn" onclick="addQuickItem(35, 'รายการที่')">+ 35฿</button>
                    <button class="quick-btn" onclick="addQuickItem(50, 'รายการที่')">+ 50฿</button>
                    <button class="quick-btn" onclick="addQuickItem(100, 'รายการที่')">+ 100฿</button>
                </div>

                <div id="numpadModeUI">
                    <div class="input-display empty" id="priceDisplay">ใส่ราคา...</div>
                    <div class="numpad">
                        <button class="btn-num" onclick="typeNum('7')">7</button>
                        <button class="btn-num" onclick="typeNum('8')">8</button>
                        <button class="btn-num" onclick="typeNum('9')">9</button>
                        <button class="btn-num" style="background-color: #fee2e2; color: var(--danger);" onclick="deleteNum()">⌫</button>
                        
                        <button class="btn-num" onclick="typeNum('4')">4</button>
                        <button class="btn-num" onclick="typeNum('5')">5</button>
                        <button class="btn-num" onclick="typeNum('6')">6</button>
                        <button class="btn-action" style="background-color: var(--danger);" onclick="clearItems()">ล้างบิล</button>
                        
                        <button class="btn-num" onclick="typeNum('1')">1</button>
                        <button class="btn-num" onclick="typeNum('2')">2</button>
                        <button class="btn-num" onclick="typeNum('3')">3</button>
                        <button class="btn-action" style="grid-column: 4; grid-row: 3 / span 2; background-color: var(--success);" onclick="addNormalPrice()">เพิ่ม<br>รายการ</button>
                        
                        <button class="btn-num" onclick="typeNum('00')">00</button>
                        <button class="btn-num" onclick="typeNum('0')">0</button>
                        <button class="btn-num" onclick="typeNum('.')">•</button>
                    </div>
                </div>

                <div id="manualModeUI" style="display: none;">
                    <input type="number" id="manualPriceInput" class="native-input" placeholder="พิมพ์ราคาสินค้า..." onkeypress="handleManualEnter(event)">
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <button class="btn success" onclick="addNormalPrice()" style="flex: 2;">เพิ่มรายการ</button>
                        <button class="btn danger" onclick="clearItems()" style="flex: 1;">ล้างบิล</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ส่วนที่ 2: หน้าคิดเงินทอน -->
    <div id="step-payment" class="section">
        <div class="flex-layout">
            <div class="flex-left">
                <div class="status-box">
                    <div class="status-row total"><span>ยอดที่ต้องจ่าย:</span><span id="payTotal">0 ฿</span></div>
                    <div class="status-row" style="color: var(--success); font-weight: 600;"><span>รับเงินมาแล้ว:</span><span id="payReceived">0 ฿</span></div>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: auto;">
                    <button onclick="showSection('step-calculate')" class="btn" style="background-color: var(--text-light); width: 60px;">🔙</button>
                    <button onclick="calculateChange()" class="btn success" style="flex: 1;">คิดเงินทอน</button>
                </div>
            </div>

            <div class="flex-right">
                <div id="tapMoneyUI">
                    <p style="text-align: center; font-size: 14px; color: var(--text-light); margin-bottom: 10px;">แตะที่เงินเพื่อบวกยอดรับ</p>
                    <div class="money-grid">
                        <button class="money-btn m-1000" onclick="addMoney(1000)">+ 1000</button>
                        <button class="money-btn m-500" onclick="addMoney(500)">+ 500</button>
                        <button class="money-btn m-100" onclick="addMoney(100)">+ 100</button>
                        <button class="money-btn m-50" onclick="addMoney(50)">+ 50</button>
                        <button class="money-btn m-20" onclick="addMoney(20)">+ 20</button>
                        <button class="money-btn m-10" onclick="addMoney(10)">+ 10</button>
                        <button class="money-btn m-5" onclick="addMoney(5)">+ 5</button>
                        <button class="money-btn m-2" onclick="addMoney(2)">+ 2</button>
                        <button class="money-btn m-1" onclick="addMoney(1)">+ 1</button>
                    </div>
                </div>

                <div id="manualMoneyUI" style="display: none;">
                    <p style="text-align: center; font-size: 14px; color: var(--text-light); margin-bottom: 10px;">พิมพ์ยอดเงินที่รับมา</p>
                    <input type="number" id="manualReceiveInput" class="native-input" placeholder="ยอดรับเงิน..." oninput="syncManualReceive()">
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button onclick="setExactMoney()" class="btn outline" style="flex: 1;">รับพอดีเป๊ะ</button>
                    <button onclick="clearMoney()" class="btn danger" style="flex: 1;">ล้างยอดรับ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ส่วนที่ 3: สลิป (ส่วนนี้ขยายขนาดตามปกติ ไม่ได้แบ่งซ้ายขวา) -->
    <div id="step-result" class="section">
        <div id="receiptCaptureArea" style="background: var(--elem-bg); padding: 20px; border-radius: 16px; margin-bottom: 15px;">
            <h3 style="text-align: center; color: var(--primary); margin-bottom: 5px;">🧾 สลิปคิดเพลิน</h3>
            <div style="text-align: center; margin-bottom: 15px;">
                <p style="color: var(--text-light); font-size: 14px;">ต้องทอนเงินลูกค้า</p>
                <div class="change-huge" id="changeAmount">0</div>
                <p style="color: var(--text-light); font-weight: 600;">บาท</p>
            </div>
            <div id="changeBreakdown" class="breakdown-list" style="background: var(--card-bg);"></div>
            <div id="receiptDate" style="text-align: center; margin-top: 15px; font-size: 12px; color: var(--text-light);"></div>
        </div>

        <button onclick="shareReceipt()" class="btn success" style="margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 8px;">
            📤 บันทึกรูป / แชร์สลิป
        </button>
        <button onclick="resetAll()" class="btn outline">✨ ปิดบิล (เริ่มใหม่)</button>
    </div>

</div>

<div id="historyModal" class="modal">
    <div class="modal-content" style="max-width: 400px; padding: 25px 20px;">
        <h2 style="color: var(--primary); margin-bottom: 5px;">📊 ยอดขายวันนี้</h2>
        <div style="font-size: 14px; color: var(--text-light);">ยอดรวมทั้งหมด</div>
        <div class="modal-data" id="historyTotal" style="font-size: 32px; margin: 5px 0;">0 ฿</div>
        <div style="font-size: 14px; margin-bottom: 15px;">จำนวน: <strong id="historyBills">0</strong> บิล</div>
        
        <div style="text-align: left; font-size: 13px; color: var(--text-light); margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 15px;">📈 ย้อนหลัง 7 วัน</div>
        
        <div id="chartContainer" style="display: flex; justify-content: space-between; gap: 5px; height: 130px; margin-top: 10px; margin-bottom: 20px; width: 100%; align-items: flex-end;"></div>

        <div style="display: flex; gap: 10px;">
            <button class="btn outline" onclick="closeHistory()">ปิด</button>
            <button class="btn danger" onclick="clearHistory()">ล้างยอด</button>
        </div>
    </div>
</div>

<script>
    let items = []; let totalAmount = 0; let currentInput = ""; let receivedAmount = 0; let billSaved = false; let isManualMode = false; let isTTSOn = true;

    let availableVoices = [];
    function loadVoices() { availableVoices = window.speechSynthesis.getVoices(); }
    window.speechSynthesis.onvoiceschanged = loadVoices;

    const globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playGlobalClick() {
        if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
        const osc = globalAudioCtx.createOscillator(); const gain = globalAudioCtx.createGain();
        osc.connect(gain); gain.connect(globalAudioCtx.destination);
        osc.frequency.setValueAtTime(800, globalAudioCtx.currentTime); gain.gain.setValueAtTime(0.1, globalAudioCtx.currentTime);
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, globalAudioCtx.currentTime + 0.1); osc.stop(globalAudioCtx.currentTime + 0.1);
    }
    
    function playSound(type = 'click') {
        if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
        const osc = globalAudioCtx.createOscillator(); const gain = globalAudioCtx.createGain();
        osc.connect(gain); gain.connect(globalAudioCtx.destination);
        if (type === 'success') { osc.type = 'triangle'; osc.frequency.setValueAtTime(1000, globalAudioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1600, globalAudioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, globalAudioCtx.currentTime); osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, globalAudioCtx.currentTime + 0.2); osc.stop(globalAudioCtx.currentTime + 0.2); } 
        else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, globalAudioCtx.currentTime); gain.gain.setValueAtTime(0.1, globalAudioCtx.currentTime); osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, globalAudioCtx.currentTime + 0.3); osc.stop(globalAudioCtx.currentTime + 0.3); }
        else { playGlobalClick(); }
    }

    document.addEventListener('click', (e) => { if(e.target.tagName === 'BUTTON' || e.target.closest('a')) playGlobalClick(); });

    if(localStorage.getItem('kidplearn_tts') === 'false') { isTTSOn = false; document.getElementById('ttsBtn').innerText = '🔇'; }
    
    function toggleTTS() {
        isTTSOn = !isTTSOn; document.getElementById('ttsBtn').innerText = isTTSOn ? '🗣️' : '🔇';
        localStorage.setItem('kidplearn_tts', isTTSOn); if(!isTTSOn) window.speechSynthesis.cancel();
    }

    function speakWithPause(part1, amount, part2) {
        if (!isTTSOn || !('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel(); 
        if (availableVoices.length === 0) availableVoices = window.speechSynthesis.getVoices();
        let thaiVoices = availableVoices.filter(v => v.lang.includes('th') || v.lang.includes('TH'));
        let preferredVoice = thaiVoices.find(v => v.name.includes('Google') || v.name.includes('Kanya') || v.name.includes('Premwadee')) || thaiVoices[0];
        let msg1 = new SpeechSynthesisUtterance(part1); msg1.lang = 'th-TH'; msg1.rate = 1.1; if (preferredVoice) msg1.voice = preferredVoice;
        let msg2 = new SpeechSynthesisUtterance(amount + " " + part2); msg2.lang = 'th-TH'; msg2.rate = 1.1; if (preferredVoice) msg2.voice = preferredVoice;
        msg1.onend = function() { setTimeout(() => { if(isTTSOn) window.speechSynthesis.speak(msg2); }, 500); };
        window.speechSynthesis.speak(msg1);
    }

    function toggleTheme() {
        const html = document.documentElement; const btn = document.getElementById('themeBtn');
        if (html.getAttribute('data-theme') === 'dark') {
            html.removeAttribute('data-theme'); btn.innerText = '🌙'; localStorage.setItem('naphathub_theme', 'light');
        } else {
            html.setAttribute('data-theme', 'dark'); btn.innerText = '☀️'; localStorage.setItem('naphathub_theme', 'dark');
        }
    }
    if(document.documentElement.getAttribute('data-theme') === 'dark') { document.getElementById('themeBtn').innerText = '☀️'; }

    function toggleInputMode() {
        isManualMode = !isManualMode; document.getElementById('modeBtn').innerText = isManualMode ? '🖩' : '⌨️';
        document.getElementById('numpadModeUI').style.display = isManualMode ? 'none' : 'block';
        document.getElementById('manualModeUI').style.display = isManualMode ? 'block' : 'none';
        document.getElementById('tapMoneyUI').style.display = isManualMode ? 'none' : 'block';
        document.getElementById('manualMoneyUI').style.display = isManualMode ? 'block' : 'none';
        localStorage.setItem('kidplearn_input_mode', isManualMode ? 'manual' : 'numpad');
        if (isManualMode && document.getElementById('step-calculate').classList.contains('active')) { document.getElementById('manualPriceInput').focus(); }
    }
    if(localStorage.getItem('kidplearn_input_mode') === 'manual') { toggleInputMode(); }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'step-calculate' && isManualMode) document.getElementById('manualPriceInput').focus();
        if (id === 'step-payment' && isManualMode) document.getElementById('manualReceiveInput').focus();
    }

    function updateDisplay() {
        const pd = document.getElementById('priceDisplay');
        if (currentInput === "") { pd.innerText = "ใส่ราคา..."; pd.classList.add('empty'); } 
        else { pd.innerText = currentInput; pd.classList.remove('empty'); }
    }

    function typeNum(num) {
        if (num === '.' && currentInput.includes('.')) return;
        if (currentInput === "0" && num !== ".") currentInput = ""; currentInput += num; updateDisplay();
    }
    function deleteNum() { currentInput = currentInput.slice(0, -1); updateDisplay(); }
    function pushItem(price, name) { items.push({ name: name, price: price }); updateItemList(); }

    function addNormalPrice() {
        let val = isManualMode ? document.getElementById('manualPriceInput').value : currentInput;
        const price = parseFloat(val);
        if (isNaN(price) || price <= 0) { playSound('error'); return; }
        playSound('success'); pushItem(price, `รายการที่`); 
        if(isManualMode) { let mi = document.getElementById('manualPriceInput'); mi.value = ""; mi.focus(); } 
        else { currentInput = ""; updateDisplay(); }
    }

    function handleManualEnter(e) { if (e.key === 'Enter') addNormalPrice(); }
    function addQuickItem(price, name) { playSound('success'); pushItem(price, name); }

    function removeItem(index) { playSound('click'); items.splice(index, 1); updateItemList(); }

    function updateItemList() {
        const list = document.getElementById('itemList'); list.innerHTML = ''; totalAmount = 0;
        if(items.length === 0) { 
            list.innerHTML = '<div class="item" style="color: var(--text-light); justify-content: center; height: 100%; align-items: center;">ยังไม่มีรายการสินค้า</div>'; 
            document.getElementById('liveTotalDisplay').innerText = '0 ฿'; return; 
        }
        let itemCounter = 1; 
        items.forEach((item, index) => {
            totalAmount += item.price;
            let displayPrice = item.price > 0 ? `${item.price.toLocaleString()} ฿` : `- ${Math.abs(item.price).toLocaleString()} ฿`;
            let itemClass = item.price < 0 ? 'item discount' : 'item';
            if (item.name.startsWith('รายการที่')) { item.name = `รายการที่ ${itemCounter}`; }
            if (item.price > 0) { itemCounter++; }
            list.innerHTML += `<div class="${itemClass}"><span>${item.name}</span> <div style="display: flex; align-items: center;"><strong>${displayPrice}</strong><button class="item-delete-btn" onclick="removeItem(${index})">❌</button></div></div>`;
        });
        list.scrollTop = list.scrollHeight;
        document.getElementById('liveTotalDisplay').innerText = totalAmount.toLocaleString() + ' ฿';
    }

    function clearItems() {
        if(items.length === 0) return;
        playSound('error');
        if(confirm('ต้องการล้างบิลทั้งหมดใช่หรือไม่?')){
            items = []; currentInput = ""; document.getElementById('manualPriceInput').value = "";
            updateDisplay(); updateItemList();
        }
    }

    function goToPayment() {
        if (totalAmount <= 0) { playSound('error'); alert('บิลยังเป็น 0 บาทครับ!'); return; }
        playSound('success'); speakWithPause('ยอดที่ต้องจ่าย', totalAmount, 'บาท');
        document.getElementById('payTotal').innerText = totalAmount.toLocaleString() + ' ฿';
        receivedAmount = 0; document.getElementById('manualReceiveInput').value = ""; updateReceivedDisplay();
        showSection('step-payment');
    }

    function syncManualReceive() {
        receivedAmount = parseFloat(document.getElementById('manualReceiveInput').value) || 0;
        document.getElementById('payReceived').innerText = receivedAmount.toLocaleString() + ' ฿';
    }

    function addMoney(amount) { receivedAmount += amount; updateReceivedDisplay(); }
    function setExactMoney() { playSound('success'); receivedAmount = totalAmount; if(isManualMode) document.getElementById('manualReceiveInput').value = totalAmount; updateReceivedDisplay(); }
    function clearMoney() { playSound('error'); receivedAmount = 0; if(isManualMode) document.getElementById('manualReceiveInput').value = ""; updateReceivedDisplay(); }
    function updateReceivedDisplay() { document.getElementById('payReceived').innerText = receivedAmount.toLocaleString() + ' ฿'; }

    function calculateChange() {
        if (receivedAmount < totalAmount) { playSound('error'); alert('รับเงินมาไม่พอครับ! (ขาดอีก ' + (totalAmount - receivedAmount).toLocaleString() + ' บาท)'); return; }
        playSound('success'); let change = receivedAmount - totalAmount; speakWithPause('เงินทอนทั้งหมด', change, 'บาท');
        document.getElementById('changeAmount').innerText = change.toLocaleString();
        generateChangeBreakdown(change);
        if (!billSaved) { saveToHistory(totalAmount); billSaved = true; }
        document.getElementById('receiptDate').innerText = 'วันที่: ' + new Date().toLocaleString('th-TH');
        showSection('step-result');
    }

    function generateChangeBreakdown(changeAmount) {
        const breakdownDiv = document.getElementById('changeBreakdown');
        breakdownDiv.innerHTML = '<div style="font-size:14px; color:var(--text-light); margin-bottom:5px; text-align:left;">รายการเงินทอน:</div>';
        if (changeAmount === 0) { breakdownDiv.innerHTML += '<div style="color:var(--success); font-weight:600;">จ่ายพอดี ไม่ต้องทอน 🎉</div>'; return; }
        const moneyTypes = [ { value: 1000, label: 'แบงค์ 1000', color: '#8b5cf6' }, { value: 500, label: 'แบงค์ 500', color: '#a855f7' }, { value: 100, label: 'แบงค์ 100', color: '#ef4444' }, { value: 50, label: 'แบงค์ 50', color: '#3b82f6' }, { value: 20, label: 'แบงค์ 20', color: '#22c55e' }, { value: 10, label: 'เหรียญ 10', color: '#64748b' }, { value: 5, label: 'เหรียญ 5', color: '#64748b' }, { value: 2, label: 'เหรียญ 2', color: '#64748b' }, { value: 1, label: 'เหรียญ 1', color: '#64748b' } ];
        let remaining = changeAmount;
        moneyTypes.forEach(money => {
            if (remaining >= money.value) {
                let count = Math.floor(remaining / money.value); remaining = remaining % money.value;
                breakdownDiv.innerHTML += `<div class="breakdown-item"><span style="color: ${money.color}; font-weight:600;">${money.label}</span><span>x <strong>${count}</strong></span></div>`;
            }
        });
    }

    function resetAll() {
        playSound('success'); items = []; totalAmount = 0; currentInput = ""; receivedAmount = 0; billSaved = false;
        document.getElementById('manualPriceInput').value = ""; document.getElementById('manualReceiveInput').value = "";
        window.speechSynthesis.cancel(); updateDisplay(); updateItemList(); showSection('step-calculate');
    }

    // ----- ระบบแชร์ใบเสร็จ/บันทึกสลิป -----
    function shareReceipt() {
        playSound('click');
        const receiptArea = document.getElementById('receiptCaptureArea');
        // ปรับสีชั่วคราวให้สลิปภาพสวยเสมอ (หลบ Dark Mode เล็กน้อยเพื่อความคมชัด)
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        receiptArea.style.background = isDark ? '#1e293b' : '#f1f5f9';
        
        html2canvas(receiptArea, { scale: 2, backgroundColor: isDark ? '#0f172a' : '#ffffff' }).then(canvas => {
            canvas.toBlob(blob => {
                const file = new File([blob], `receipt_${new Date().getTime()}.png`, { type: "image/png" });
                // ลองแชร์ถ้ามือถือรองรับ
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({ title: 'ใบเสร็จจากคิดเพลิน', files: [file] }).catch(err => downloadBlob(blob));
                } else {
                    // ถ้าแชร์ไม่ได้ ให้ดาวน์โหลดลงเครื่องแทน
                    downloadBlob(blob);
                }
            });
        });
    }
    function downloadBlob(blob) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `receipt_${new Date().getTime()}.png`;
        link.href = url; link.click(); URL.revokeObjectURL(url);
    }

    // ----- ระบบยอดขายแบบ 7 วัน (กราฟ) -----
    function getTodayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
    
    function saveToHistory(amount) { 
        let history = JSON.parse(localStorage.getItem('kidplearn_history_v2')) || {}; 
        let today = getTodayStr();
        if (!history[today]) history[today] = { bills: 0, total: 0 };
        history[today].bills += 1; history[today].total += amount; 
        localStorage.setItem('kidplearn_history_v2', JSON.stringify(history)); 
    }
    
    function openHistory() { 
        let history = JSON.parse(localStorage.getItem('kidplearn_history_v2')) || {}; 
        let todayData = history[getTodayStr()] || { bills: 0, total: 0 };
        document.getElementById('historyTotal').innerText = todayData.total.toLocaleString() + ' ฿'; 
        document.getElementById('historyBills').innerText = todayData.bills.toLocaleString(); 
        renderChart(history);
        document.getElementById('historyModal').classList.add('active'); 
    }
    
    function renderChart(history) {
        const chart = document.getElementById('chartContainer'); chart.innerHTML = '';
        let days = []; let maxTotal = 1;
        for(let i=6; i>=0; i--) {
            let d = new Date(); d.setDate(d.getDate() - i);
            let dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            let total = history[dateStr] ? history[dateStr].total : 0;
            if(total > maxTotal) maxTotal = total;
            days.push({ label: `${d.getDate()}/${d.getMonth()+1}`, total: total });
        }
        days.forEach(day => {
            let hPct = (day.total / maxTotal) * 100;
            chart.innerHTML += `
                <div style="display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%;">
                    <div style="font-size: 10px; color: var(--text-light); margin-bottom: 2px; font-weight:600;">${day.total>0?day.total.toLocaleString():''}</div>
                    <div style="width: 100%; max-width: 30px; flex-grow: 1; background: var(--elem-bg); border-radius: 6px; position: relative; display: flex; align-items: flex-end; overflow: hidden;">
                        <div style="width: 100%; height: ${hPct}%; background: var(--primary); border-radius: 6px; transition: height 0.5s;"></div>
                    </div>
                    <div style="font-size: 11px; margin-top: 5px; color: var(--text-light);">${day.label}</div>
                </div>`;
        });
    }

    function closeHistory() { document.getElementById('historyModal').classList.remove('active'); }
    function clearHistory() { 
        playSound('error'); 
        if(confirm('ยืนยันการล้างยอดขายทั้งหมด? (รวมถึงกราฟย้อนหลัง 7 วัน จะถูกล้างทั้งหมด)')) { 
            localStorage.setItem('kidplearn_history_v2', JSON.stringify({})); openHistory(); 
        } 
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
